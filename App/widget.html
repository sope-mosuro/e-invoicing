<!DOCTYPE html>
<html>
  <head>
    <script src="https://js.zohostatic.com/creator/widgets/version/2.0/widgetsdk.js"></script>
    <script>
        function reportupdate(){
        ZOHO.CREATOR.init()
        .then(function(data) {
     
          var invoice_number = document.getElementById("invoice_number").value;
    
             var config = {
  appName: "e-invoicing-portal",
  criteria: "Invoice_Number == \"" + invoice_number + "\"",
  reportName: "All_Invoices"
};
 

ZOHO.CREATOR.DATA.getRecords(config).then(function (response) {
  console.log(response);
  var formreset=document.getElementById("myform").reset();
}).catch(function(error) {
  console.error("Unable to fetch records", error);
});
        
      });
            }
  </script>
  </head>
  <style>
  input[type=text], select {
    width: 100%;
    padding: 12px 20px;
    margin: 8px 0;
    display: inline-block;
    border: 1px solid #ccc;
    border-radius: 4px;
    box-sizing: border-box;
  }
  
  input[type=submit] {
    width: 100%;
    background-color: #4CAF50;
    color: white;
    padding: 14px 20px;
    margin: 8px 0;
    border: none;
    border-radius: 4px;
    cursor: pointer;
  }
  
  input[type=submit]:hover {
    background-color: #45a049;
  }
  
  div {
    border-radius: 5px;
    background-color: #f2f2f2;
    padding: 20px;
  }
  
  </style>
  <body>
    <h2>Form to update a report</h2>
    <div>
      <form id="myform">
  

        <label for="invoice_number">Invoice Number</label>
        <input type="text" id="invoice_number" name="invoice_number" placeholder="Enter Invoice Number..">    


        <input type="button" value="submit" onClick="reportupdate()">
        
    
      </form>
      
    </div>
    
  </body>
</html>
